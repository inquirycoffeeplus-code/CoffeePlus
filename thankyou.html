<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | CoffeePlus</title>

  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .thankyou {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      background: #f7f3ef;
    }

    .thankyou h1 {
      font-size: 42px;
      color: #6f4e37;
      margin-bottom: 15px;
    }

    .thankyou p {
      font-size: 18px;
      color: #444;
      max-width: 500px;
    }

    .spinner {
      margin-top: 20px;
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top: 4px solid #6f4e37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<div class="thankyou">
  <h1>Thank You!</h1>

  <p>
    We’ve received your request. A CoffeePlus representative will contact you shortly to discuss your request. 
  </p>

  <div class="spinner"></div>

  <p style="margin-top:20px;">
    Redirecting to homepage in <span id="count">5</span> seconds...
  </p>
</div>

<script>
  let count = 5;

  const interval = setInterval(() => {
    count--;
    document.getElementById("count").innerText = count;

    if (count === 0) {
      clearInterval(interval);
      window.location.href = "index.html";
    }
  }, 1000);
</script>

</body>
</html>
